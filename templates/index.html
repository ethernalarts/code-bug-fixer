<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
        <title>Bug Fixer</title>
        <!-- <script 
            src="https://cdn.jsdelivr.net/npm/htmx.org@latest/dist/htmx.min.js" 
            integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" 
            crossorigin="anonymous"></script> -->
        <script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
    </head>

    <body class="font-sans bg-gray-100 p-2">
        <div class="text-center">
            <h1 class="font-bold text-4xl p-4 bg-blue-800 text-white">
                Bug Fixer
            </h1>
        </div>

        <!-- Outer Form Container -->
        <div class="p-4">

            <!-- Form -->
            <form>
                <!-- Inner Form Container -->
                <div 
                    id="clear-textboxes"
                    class="grid grid-cols-1 place-items-center gap-y-4">

                    <!-- Input Text boxes -->
                    <div class="flex flex-col md:flex-row w-full space-y-4 md:space-y-0 md:space-x-4">
                        <!-- Paste buggy code textbox -->
                        <textarea 
                            class="w-full py-2 px-4 h-40 border-2 border-stone-400 outline-0 focus:border-stone-500 
                                  shadow-md shadow-stone-400"
                            name="code" 
                            placeholder="Paste buggy code here"></textarea>
                        
                        <!-- Paste error message textbox -->
                        <textarea  
                            class="w-full py-2 px-4 h-40 border-2 border-stone-400 outline-0 focus:border-stone-500 
                                  shadow-md shadow-stone-400" 
                            name="error_message"
                            placeholder="Paste error message here"></textarea>
                    </div>

                    <!-- Output Text boxes -->
                    <div 
                        id="response-area"
                        class="flex flex-col md:flex-row w-full gap-y-4 md:gap-y-2 md:gap-x-4"> 
                                          
                        <!-- Corrected Code Textbox -->
                        <textarea  
                            class="w-full py-2 px-4 h-40 border-2 border-stone-400 outline-0 focus:border-stone-500 
                                  shadow-md shadow-stone-400" 
                            placeholder="Corrected code will appear here" readonly>{{ corrected_code }}</textarea> 
                        
                        <!-- Error Explanation Textbox -->
                        <textarea 
                            class="w-full py-2 px-4 h-40 border-2 border-stone-400 outline-0 focus:border-stone-500 
                                  shadow-md shadow-stone-400" 
                            placeholder="Error explanation will appear here" readonly>{{ error_explained }}</textarea>
                    </div>
                </div>

                <!-- Submit Button -->
                <button 
                    hx-post="/submit"
                    hx-target="#response-area"
                    hx-swap="outerHTML"
                    class="text-white text-lg font-semibold py-4 px-6 bg-blue-700 rounded-sm cursor-pointer 
                            hover:bg-blue-600 mt-4 w-full md:w-auto" 
                >
                    <span class="inline-flex items-center">
                        <svg 
                            xmlns="http://www.w3.org/2000/svg" 
                            viewBox="0 0 24 24" 
                            fill="currentColor" 
                            class="size-5.5 mr-2"
                        >
                            <path fill-rule="evenodd" d="M12 6.75a5.25 5.25 0 0 1 6.775-5.025.75.75 0 0 1 .313 1.248l-3.32 3.319c.063.475.276.934.641 1.299.365.365.824.578 1.3.64l3.318-3.319a.75.75 0 0 1 1.248.313 5.25 5.25 0 0 1-5.472 6.756c-1.018-.086-1.87.1-2.309.634L7.344 21.3A3.298 3.298 0 1 1 2.7 16.657l8.684-7.151c.533-.44.72-1.291.634-2.309A5.342 5.342 0 0 1 12 6.75ZM4.117 19.125a.75.75 0 0 1 .75-.75h.008a.75.75 0 0 1 .75.75v.008a.75.75 0 0 1-.75.75h-.008a.75.75 0 0 1-.75-.75v-.008Z" clip-rule="evenodd" />
                            <path d="m10.076 8.64-2.201-2.2V4.874a.75.75 0 0 0-.364-.643l-3.75-2.25a.75.75 0 0 0-.916.113l-.75.75a.75.75 0 0 0-.113.916l2.25 3.75a.75.75 0 0 0 .643.364h1.564l2.062 2.062 1.575-1.297Z" />
                            <path fill-rule="evenodd" d="m12.556 17.329 4.183 4.182a3.375 3.375 0 0 0 4.773-4.773l-3.306-3.305a6.803 6.803 0 0 1-1.53.043c-.394-.034-.682-.006-.867.042a.589.589 0 0 0-.167.063l-3.086 3.748Zm3.414-1.36a.75.75 0 0 1 1.06 0l1.875 1.876a.75.75 0 1 1-1.06 1.06L15.97 17.03a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                        </svg>
                        Fix My Code
                    </span>
                </button>

                <!-- Reset Button -->
                <button
                    hx-get="/"
                    hx-target="#clear-textboxes"
                    hx-swap="outerHTML"
                    hx-indicator="#indicator"                    
                    class="text-white text-lg font-semibold py-4 px-6 bg-red-700 rounded-sm cursor-pointer 
                            hover:bg-red-600 mt-4 md:mt-6 w-full md:w-auto md:ml-2" 
                >
                    <span class="inline-flex items-center">
                        <svg 
                            xmlns="http://www.w3.org/2000/svg" 
                            viewBox="0 0 24 24" 
                            fill="currentColor" 
                            class="size-5 mr-2">
                            <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd" />
                        </svg>
                        Clear
                    </span>
                </button>
                <!-- <img id="indicator" 
                    class="htmx-indicator"                     
                    src="{{ url_for('static', filename='svg-loaders-master/svg-loaders/three-dots.svg') }}" 
                    alt="Loading..."
                > -->
            </form>
        </div>        

    </body>

</html>
