<!-- Inner Form Container -->
<div 
    id="clear-textboxes"
    class="grid grid-cols-1 place-items-center gap-y-4">

    <!-- Input Text boxes -->
    <div class="flex flex-col md:flex-row w-full space-y-4 md:space-y-0 md:space-x-4">
        <!-- Paste buggy code textbox -->
        <textarea 
            class="w-full py-2 px-4 h-40 border-2 border-stone-400 outline-0 focus:border-stone-500 
                    shadow-md shadow-stone-400"
            name="code" 
            placeholder="Paste buggy code here"></textarea>
        
        <!-- Paste error message textbox -->
        <textarea  
            class="w-full py-2 px-4 h-40 border-2 border-stone-400 outline-0 focus:border-stone-500 
                    shadow-md shadow-stone-400" 
            name="error_message"
            placeholder="Paste error message here"></textarea>
    </div>

    <!-- Output Text boxes -->
    <div 
        id="response-area"
        class="flex flex-col md:flex-row w-full gap-y-4 md:gap-y-2 md:gap-x-4"> 
                            
        <!-- Corrected Code Textbox -->
        <textarea  
            class="w-full py-2 px-4 h-40 border-2 border-stone-400 outline-0 focus:border-stone-500 
                    shadow-md shadow-stone-400" 
            placeholder="Corrected code will appear here" readonly></textarea> 
        
        <!-- Error Explanation Textbox -->
        <textarea 
            class="w-full py-2 px-4 h-40 border-2 border-stone-400 outline-0 focus:border-stone-500 
                    shadow-md shadow-stone-400" 
            placeholder="Error explanation will appear here" readonly></textarea>
    </div>
</div>
